<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>External App — Demo</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/did-button.css">
  <style>
    .demo-container {
      max-width: 600px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      color: #333;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .demo-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #111;
    }
    .demo-desc {
      color: #666;
      margin-bottom: 30px;
    }
    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body style="background: #f3f4f6;">
  <div class="demo-container">
    <div class="status-badge">Locked — Authentication Required</div>
    <h1 class="demo-title">Premium Content Portal</h1>
    <p class="demo-desc">
      Welcome to the Demo Portal. This is an <strong>external website</strong> that requires high-trust users. 
      Please sign in with your verified Identity to proceed.
    </p>

    <!-- Sign In Button -->
    <a href="/authorize?redirect_uri=http://localhost:5000/demo/callback.html" class="did-connect-button" style="padding: 15px 30px; font-size: 18px;">
      <span class="did-icon">⬡</span>
      Continue with DIDChain
    </a>

    <p style="margin-top: 30px; font-size: 12px; color: #999;">
      Powered by DIDChain Decentralized Identity System
    </p>
  </div>
</body>
</html>
